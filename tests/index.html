<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tests</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fb;
            color: #fff;
            padding-bottom: 85px;
        }

        /* NAVBAR */

        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid #e9eef5;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.03);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 17px;
            color: #0f172a !important;
            letter-spacing: -0.3px;
        }

        .navbar-brand img {
            border: 2px solid #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .navbar .btn-light {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            padding: 6px 14px;
            transition: .2s ease;
        }

        .navbar .btn-light:hover {
            background: #e2e8f0;
        }

        /* SECTION */

        .tests-section {
            padding: 20px 0;
        }

        /* CARD */

        .nav-test-card {
            position: relative;
            overflow: hidden;
            border-radius: 26px;
            min-height: 160px;
            background-size: cover;
            background-position: center;
            transition: all .3s ease;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .nav-test-card:hover {
            transform: translateY(-5px);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.18);
        }

        /* BACKGROUND IMAGES */

        .anatomy-card {
            background-image:
                url('https://images.unsplash.com/photo-1530026405186-ed1f139313f8?q=80&w=1200');
        }

        .exam-card {
            background-image:
                url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200');
        }

        .bio-card {
            background-image:
                url('https://images.unsplash.com/photo-1532187643603-ba119ca4109e?q=80&w=1200');
        }

        .random-card {
            background-image:
                url('https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1200');
        }

        /* OVERLAY */

        .card-overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to right,
                    rgba(15, 23, 42, 0.92),
                    rgba(15, 23, 42, 0.65));
        }

        .card-body {
            position: relative;
            z-index: 2;
            padding: 18px;
        }

        /* ICON */

        .card-avatar {
            width: 54px;
            height: 54px;
            min-width: 54px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 22px;
            color: white;
        }

        /* TEXT */

        .card-title-custom {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .card-subtitle-custom {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 10px;
        }

        /* TEST COUNT */

        .test-count {
            display: inline-flex;
            align-items: center;
            gap: 5px;

            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.1);

            color: white;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ENGLISH */

        .english-pill {
            background: white;
            color: #111827;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 999px;
        }

        /* START BUTTON */

        .start-btn {
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 12px;
            background: white;
            color: #111827;

            display: flex;
            align-items: center;
            justify-content: center;

            transition: .2s ease;
        }

        .nav-test-card:hover .start-btn {
            transform: translateX(3px);
        }

        /* BOTTOM NAV */

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 68px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
            border-top: 1px solid #e5eaf1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1050;
        }

        .bottom-nav .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
            transition: .2s ease;
        }

        .bottom-nav .nav-item i {
            display: block;
            font-size: 21px;
            margin-bottom: 2px;
        }

        .bottom-nav .nav-item.active {
            color: #0d6efd;
        }

        .bottom-nav .nav-item:hover {
            color: #0d6efd;
        }

        /* MOBILE */

        @media(max-width:768px) {

            .row.g-3 {
                --bs-gutter-y: 14px;
                --bs-gutter-x: 14px;
            }

            .card-body {
                padding: 16px;
            }

            .card-title-custom {
                font-size: 14px;
            }

            .nav-test-card {
                min-height: 150px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <img src="/assets/img/PulseGo.jpg" width="40" height="40" class="rounded-circle">
                Pulse Go
            </a>

            <a href="/" class="btn btn-light btn-sm">
                <i class="bi bi-house"></i> Home
            </a>

        </div>
    </nav>

    <!-- TEST SECTION -->

    <section class="tests-section">
        <div class="container">

            <div class="row g-3">

                <!-- CARD 1 -->

                <div class="col-md-4 col-12">

                    <a href="/anatomy" class="text-decoration-none">

                        <div class="card nav-test-card anatomy-card border-0">

                            <div class="card-overlay"></div>

                            <div class="card-body d-flex align-items-center">

                                <div class="card-avatar">
                                    <i class="bi bi-heart-pulse"></i>
                                </div>

                                <div class="flex-grow-1 ms-3">

                                    <div class="card-title-custom">
                                        Anatomiya testlari
                                    </div>

                                    <div class="card-subtitle-custom">
                                        Mavzular bo'yicha testlar
                                    </div>

                                    <div class="d-flex align-items-center gap-2 flex-wrap">

                                        <div class="test-count">
                                            <i class="bi bi-ui-checks-grid"></i>
                                            454 test
                                        </div>

                                        <span class="english-pill">
                                            ENG
                                        </span>

                                    </div>

                                </div>

                                <div class="start-btn">
                                    <i class="bi bi-arrow-right"></i>
                                </div>

                            </div>

                        </div>

                    </a>

                </div>

                <!-- CARD 2 -->

                <div class="col-md-4 col-12">

                    <a href="/anatomy/yn/" class="text-decoration-none">

                        <div class="card nav-test-card exam-card border-0">

                            <div class="card-overlay"></div>

                            <div class="card-body d-flex align-items-center">

                                <div class="card-avatar">
                                    <i class="bi bi-journal-check"></i>
                                </div>

                                <div class="flex-grow-1 ms-3">

                                    <div class="card-title-custom">
                                        Yakuniy rasmli testlar
                                    </div>

                                    <div class="card-subtitle-custom">
                                        YN uchun maxsus
                                    </div>

                                    <div class="d-flex align-items-center gap-2 flex-wrap">

                                        <div class="test-count">
                                            <i class="bi bi-ui-checks-grid"></i>
                                            500+ test
                                        </div>

                                        <span class="english-pill">
                                            ENG
                                        </span>

                                    </div>

                                </div>

                                <div class="start-btn">
                                    <i class="bi bi-arrow-right"></i>
                                </div>

                            </div>

                        </div>

                    </a>

                </div>

                <!-- CARD 3 -->

                <div class="col-md-4 col-12">

                    <a href="/embriology" class="text-decoration-none">

                        <div class="card nav-test-card bio-card border-0">

                            <div class="card-overlay"></div>

                            <div class="card-body d-flex align-items-center">

                                <div class="card-avatar">
                                    <i class="bi bi-virus"></i>
                                </div>

                                <div class="flex-grow-1 ms-3">

                                    <div class="card-title-custom">
                                        Hujayra biologiyasi
                                    </div>

                                    <div class="card-subtitle-custom">
                                        Mavzular bo'yicha testlar
                                    </div>

                                    <div class="d-flex align-items-center gap-2 flex-wrap">

                                        <div class="test-count">
                                            <i class="bi bi-ui-checks-grid"></i>
                                            454 test
                                        </div>

                                        <span class="english-pill">
                                            ENG
                                        </span>

                                    </div>

                                </div>

                                <div class="start-btn">
                                    <i class="bi bi-arrow-right"></i>
                                </div>

                            </div>

                        </div>

                    </a>

                </div>

                <!-- CARD 4 -->

                <div class="col-md-4 col-12">

                    <a href="#" class="text-decoration-none">

                        <div class="card nav-test-card random-card border-0">

                            <div class="card-overlay"></div>

                            <div class="card-body d-flex align-items-center">

                                <div class="card-avatar">
                                    <i class="bi bi-lightning-charge"></i>
                                </div>

                                <div class="flex-grow-1 ms-3">

                                    <div class="card-title-custom">
                                        YN test baza
                                    </div>

                                    <div class="card-subtitle-custom">
                                        30 ta random test
                                    </div>

                                    <div class="d-flex align-items-center gap-2 flex-wrap">

                                        <div class="test-count">
                                            <i class="bi bi-ui-checks-grid"></i>
                                            3000+ test
                                        </div>

                                        <span class="english-pill">
                                            ENG
                                        </span>

                                    </div>

                                </div>

                                <div class="start-btn">
                                    <i class="bi bi-arrow-right"></i>
                                </div>

                            </div>

                        </div>

                    </a>

                </div>

            </div>

        </div>
    </section>

    <!-- BOTTOM NAV -->

    <nav class="bottom-nav d-lg-none">

        <a href="/" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Asosiy</span>
        </a>

        <a href="/tests" class="nav-item active">
            <i class="bi bi-ui-checks-grid"></i>
            <span>Testlar</span>
        </a>

        <a href="/cases" class="nav-item">
            <i class="bi bi-journal-text"></i>
            <span>Caselar</span>
        </a>

    </nav>

</body>

</html>
