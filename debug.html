<!DOCTYPE html>
<html>

<head>
    <title>PulseGo Debug Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: monospace;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .title {
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="p-3">

    <h3>🧪 PulseGo Debug Panel</h3>

    <div class="box">
        <div class="title">⏳ Loading...</div>
    </div>

    <div id="output"></div>

    <script>
        function toUZTime(date) {
            if (!date) return "null";

            return new Date(date).toLocaleString("uz-UZ", {
                timeZone: "Asia/Tashkent"
            });
        }

        function loadDebug() {

            const raw = localStorage.getItem("pulsego_data_v1");
            const data = raw ? JSON.parse(raw) : {};

            const sync = JSON.parse(localStorage.getItem("pulsego_sync_v1") || "{}");

            const overview = data.tests ? {
                totalTests: data.tests.length,
                totalQuestions: data.tests.reduce((s, t) => s + (t.total || 0), 0),
                totalCorrect: data.tests.reduce((s, t) => s + (t.correct || 0), 0),
            } : {};

            const percent = overview.totalQuestions
                ? Math.round((overview.totalCorrect / overview.totalQuestions) * 100)
                : 0;

            const html = `
<div class="box">
<b>👤 USER</b>
${JSON.stringify(data.user, null, 2)}
</div>

<div class="box">
<b>📊 OVERVIEW</b>
${JSON.stringify({ ...overview, percent }, null, 2)}
</div>

<div class="box">
<b>🕒 LAST SYNC (UZ TIME)</b>
${toUZTime(sync.lastSync)}
</div>

<div class="box">
<b>🔄 SYNC RAW</b>
${JSON.stringify(sync, null, 2)}
</div>

<div class="box">
<b>🧠 LOCALSTORAGE</b>
${JSON.stringify(data, null, 2)}
</div>
`;

            document.getElementById("output").innerHTML = html;
        }
        loadDebug();
    </script>

</body>

</html>
