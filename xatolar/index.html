<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Xatolar Moduli - Test errors management system">
    <title>Xatolar Moduli</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- Main Content -->
    <main id="test-selection" class="container py-5">
        <div class="row">
            <div class="col-lg-8 col-xl-6">
                <h1 class="mb-4 fw-bold">Xatolar Moduli</h1>

                <p class="text-muted mb-5">
                    Xatolarni ko'rish yoki qayta yechish uchun quyidagi variantlardan birini tanlang.
                </p>

                <!-- Action Buttons -->
                <div class="d-flex gap-3 flex-column flex-sm-row">
                    <button class="btn btn-primary btn-lg" id="seeMistakesBtn" data-action="view" type="button">
                        <span class="me-2">👁️</span>
                        Xatolarni ko'rish
                    </button>

                    <button class="btn btn-success btn-lg" id="resolveMistakesBtn" data-action="resolve" type="button">
                        <span class="me-2">✓</span>
                        Xatolarni yechish
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Scripts -->
    <script src="/assets/js/data.js"></script>
    <script src="/assets/js/test.js"></script>

    <!-- Application Logic -->
    <script>
        // Configuration
        const CONFIG = {
            modalsPath: '/assets/modals/modals.html',
            testScreenId: 'test-screen',
            loadTimeout: 5000
        };

        /**
         * Load test layout modal dynamically
         * @returns {Promise<void>}
         */
        async function loadTestLayout() {
            // Prevent duplicate loading
            if (document.getElementById(CONFIG.testScreenId)) {
                return;
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.loadTimeout);

                const response = await fetch(CONFIG.modalsPath, {
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const html = await response.text();
                document.body.insertAdjacentHTML('beforeend', html);

            } catch (error) {
                console.error('Failed to load test layout:', error);
                showErrorNotification('Layout yuklanishda xato. Qaytadan urinib ko\'ring.');
            }
        }

        /**
         * Show error notification to user
         * @param {string} message - Error message to display
         */
        function showErrorNotification(message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show';
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            document.body.insertAdjacentElement('afterbegin', alertDiv);
        }

        /**
         * Initialize event listeners
         */
        function initializeEventListeners() {
            const seeMistakesBtn = document.getElementById('seeMistakesBtn');
            const resolveMistakesBtn = document.getElementById('resolveMistakesBtn');

            if (seeMistakesBtn) {
                seeMistakesBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    await loadTestLayout();
                    if (typeof openXatolarModal === 'function') {
                        openXatolarModal();
                    }
                });
            }

            if (resolveMistakesBtn) {
                resolveMistakesBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    await loadTestLayout();
                    if (typeof startXatolarReview === 'function') {
                        startXatolarReview();
                    }
                });
            }
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', initializeEventListeners);
    </script>

</body>

</html>
