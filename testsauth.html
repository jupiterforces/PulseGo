<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Authentication</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .2);
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        #userBox {
            margin-bottom: 20px;
        }

        .user-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #667eea;
        }

        .user-name {
            font-size: 22px;
            font-weight: 600;
            color: #333;
        }

        .user-email {
            color: #666;
            margin-top: 5px;
        }

        .status {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
            margin-top: 10px;
        }

        .login-btn {
            background: #4285F4;
            color: white;
        }

        .login-btn:hover {
            background: #3367D6;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #e53935;
            color: white;
            display: none;
        }

        .logout-btn:hover {
            background: #c62828;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Google Login</h1>
        <p class="subtitle">Firebase Authentication Demo</p>

        <div id="userBox">
            <div class="status">Not logged in ❌</div>
        </div>

        <button id="loginBtn" class="btn login-btn">
            Login with Google
        </button>

        <button id="logoutBtn" class="btn logout-btn">
            Logout
        </button>

    </div>

    <script type="module">

        import { auth, provider } from "./firebase.js";

        import {
            signInWithPopup,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const userBox = document.getElementById("userBox");

        loginBtn.onclick = async () => {
            try {
                await signInWithPopup(auth, provider);

                // redirect olish
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get("redirect") || "/";

                window.location.href = redirect;

            } catch (e) {
                console.error(e);
                alert(e.message);
            }
        };

        logoutBtn.onclick = async () => {
            await signOut(auth);
        };

        onAuthStateChanged(auth, (user) => {

            if (user) {

                userBox.innerHTML = `
                    <img class="user-photo" src="${user.photoURL}" alt="">
                    <div class="user-name">${user.displayName}</div>
                    <div class="user-email">${user.email}</div>
                `;

                loginBtn.style.display = "none";
                logoutBtn.style.display = "block";

            } else {

                userBox.innerHTML = `
                    <div class="status">
                        Not logged in ❌
                    </div>
                `;

                loginBtn.style.display = "block";
                logoutBtn.style.display = "none";
            }

        });

    </script>

</body>

</html>
