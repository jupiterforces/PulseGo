<!DOCTYPE html>
<html>

<head>
    <title>PulseGo Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .user-card {
            display: flex;
            justify-content: space-between;
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        .main-value {
            font-size: 20px;
            font-weight: bold;
        }

        .muted-small {
            font-size: 12px;
            color: #94a3b8;
        }

        .rank-badge {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .top1 {
            background: gold;
            color: black;
        }

        .top2 {
            background: silver;
            color: black;
        }

        .top3 {
            background: #cd7f32;
            color: black;
        }

        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: none !important;
            color: white !important;
        }

        input::placeholder {
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="gate" class="container mt-5">
        <div class="glass p-4">
            <h4>Enter Access Code</h4>

            <input id="codeInput" class="form-control mb-3" placeholder="Enter code...">

            <button class="btn btn-primary w-100" onclick="checkCode()">Unlock</button>

            <div id="err" class="text-danger mt-2 d-none">Wrong code!</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="container mt-4 d-none">

        <h3>📊 PulseGo Pro Analytics</h3>

        <!-- CONTROLS -->
        <div class="glass p-3 mb-3">

            <input id="search" class="form-control mb-2" placeholder="Search users..." oninput="render()">

            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-sm btn-primary" onclick="setMode('percent')">Percent</button>
                <button class="btn btn-sm btn-outline-light" onclick="setMode('totalCorrect')">Correct</button>
                <button class="btn btn-sm btn-outline-light" onclick="setMode('totalQuestions')">Questions</button>
                <button class="btn btn-sm btn-outline-light" onclick="setMode('totalTests')">Tests</button>
            </div>

        </div>

        <!-- LIST -->
        <div class="glass p-3">
            <div id="list"></div>
        </div>

    </div>

    <script type="module">

        import { db } from "./firebase.js";
        import { collection, getDocs }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        let USERS = [];
        let MODE = "percent";

        // ----------------------
        window.checkCode = async function () {

            const code = document.getElementById("codeInput").value;

            if (code !== "gironic") {
                document.getElementById("err").classList.remove("d-none");
                return;
            }

            document.getElementById("gate").classList.add("d-none");
            document.getElementById("dashboard").classList.remove("d-none");

            await loadUsers();
        };

        // ----------------------
        async function loadUsers() {

            const snap = await getDocs(collection(db, "users"));

            USERS = [];

            snap.forEach(doc => {

                const u = doc.data();
                const o = u.overview || {};

                USERS.push({
                    name: u.name,
                    about: u.about || "",
                    percent: o.percent || 0,
                    totalCorrect: o.totalCorrect || 0,
                    totalQuestions: o.totalQuestions || 0,
                    totalTests: o.totalTests || 0
                });
            });

            render();
        }

        // ----------------------
        window.setMode = function (mode) {
            MODE = mode;
            render();
        };

        // ----------------------
        window.render = function () {

            let search = document.getElementById("search")?.value?.toLowerCase() || "";

            let list = USERS.filter(u =>
                u.name.toLowerCase().includes(search)
            );

            list.sort((a, b) => b[MODE] - a[MODE]);

            let html = "";
            let rank = 1;

            list.forEach((u, i) => {

                let badge = "";
                if (i === 0) badge = "top1";
                else if (i === 1) badge = "top2";
                else if (i === 2) badge = "top3";

                html += `
        <div class="user-card">

            <div>
                <span class="rank-badge ${badge}">#${rank++}</span>
                <b>${u.name}</b><br>
                <div class="muted-small">${u.about}</div>
            </div>

            <div class="text-end">
                <div class="main-value">${u[MODE]}</div>

                <div class="muted-small">
                    % ${u.percent} | Q ${u.totalQuestions} | C ${u.totalCorrect} | T ${u.totalTests}
                </div>
            </div>

        </div>`;
            });

            document.getElementById("list").innerHTML = html;
        };

    </script>

</body>

</html>
