<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile — PulseGo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link href="../profile/styles.css" rel="stylesheet" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar sticky-top">
        <div class="container">
            <a href="#" class="navbar-brand d-flex align-items-center gap-2">
                <img src="../assets/img/PulseGo.jpg">
                Pulse Go
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                <ul class="navbar-nav gap-3 align-items-lg-center">
                    <li class="nav-item"><a class="nav-link active" href="#about">Biz</a></li>
                    <li class="nav-item"><a class="nav-link" href="#services">Xizmatlar</a></li>
                    <li class="nav-item">
                        <a class="btn btn-light btn-sm px-3" href="https://t.me/broinibek" target="_blank">
                            <i class="bi bi-telephone-fill me-1"></i> Kontakt
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- USER CARD -->
    <div id="userCard" class="card">
        <strong id="userName">Guest</strong>
        <div id="userAbout" class="muted">No profile data</div>
        <div class="muted" id="userCreated"></div>
        <div class="mt-2">
            <button id="editProfile" class="btn">Edit</button>
            <button id="reloadData" class="btn">Refresh</button>
            <button id="clearData" class="btn btn-danger">Clear All Data</button>
        </div>
    </div>

    <!-- OVERVIEW -->
    <div id="overview" class="card overview">
        <div class="overview-left">
            <div class="muted">Overall progress</div>
            <h3 id="overallPercent">0%</h3>
            <div class="muted" id="overallDetail">0 tests • 0 correct of 0</div>
        </div>

        <div class="overview-right">
            <button id="exportAll" class="btn">Export All</button>
            <button id="clearMistakes" class="btn">Clear Mistakes</button>
        </div>
    </div>

    <!-- TESTS -->
    <div class="card">
        <h3>Tests</h3>

        <div class="filters">
            <input id="filterSearch" placeholder="Search test name...">
            <select id="filterSort">
                <option value="date_desc">Date ▾</option>
                <option value="date_asc">Date ▴</option>
                <option value="percent_desc">Percent ▾</option>
                <option value="percent_asc">Percent ▴</option>
            </select>
            <input id="filterMinPercent" type="number" placeholder="Min %">
            <input id="filterFrom" type="date">
            <input id="filterTo" type="date">
            <button id="applyFilters" class="btn">Apply</button>
            <button id="clearFilters" class="btn">Clear</button>
        </div>

        <div id="noTests" class="muted">No tests recorded yet.</div>

        <table id="testsTable">
            <thead>
                <tr>
                    <th>When</th>
                    <th>Test</th>
                    <th>Score</th>
                    <th>Mistakes</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div id="testsEmptyNote" class="muted"></div>
    </div>

    <!-- MISTAKES -->
    <div class="card">
        <h3>Recent Mistakes</h3>
        <div id="noMistakes" class="muted">No mistakes stored.</div>
        <ul id="mistakesList"></ul>
    </div>

    <!-- BOTTOM NAVIGATION FOOTER -->
    <nav class="bottom-nav d-lg-none">
        <a href="../" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Asosiy</span>
        </a>
        <a href="../tests" class="nav-item">
            <i class="bi bi-ui-checks-grid"></i>
            <span>Testlar</span>
        </a>
        <a href="../cases" class="nav-item">
            <i class="bi bi-journal-text"></i>
            <span>Caselar</span>
        </a> <a href="../profile" class="nav-item active">
            <i class="bi bi-journal-text"></i>
            <span>Profil</span>
        </a>
    </nav>

    <!-- DATA + JS -->
    <script src="../assets/js/data.js"></script>
    <script src="../profile/profile.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
