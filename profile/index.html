<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile — PulseGo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link href="../profile/styles.css" rel="stylesheet" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar sticky-top">
        <div class="container">
            <a href="#" class="navbar-brand d-flex align-items-center gap-2">
                <img src="../assets/img/PulseGo.jpg">
                Pulse Go
            </a>
        </div>
    </nav>

    <!-- USER CARD -->
    <div id="userCard" class="card">
        <strong id="userName">Guest</strong>
        <div id="userAbout" class="muted">No profile data</div>
        <div class="muted" id="userCreated"></div>

        <div class="mt-2">
            <button id="editProfile" class="btn">Edit</button>
            <button id="reloadData" class="btn">Yangilash</button>
        </div>
    </div>

    <!-- OVERVIEW -->
    <div id="overview" class="card overview">
        <div class="overview-left">
            <div class="muted">Overall progress</div>
            <h3 id="overallPercent">0%</h3>
            <div class="muted" id="overallDetail">
                0 tests • 0 correct of 0
            </div>
        </div>
    </div>

    <!-- ERRORS MODULE -->
    <div id="mistakeCard" class="card mt-3">

        <div class="d-flex align-items-center mb-3">
            <div>

                <h5 class="fw-bold mb-1">
                    Xatolar
                </h5>

            </div>

        </div>

        <div class="list-group list-group-flush mt-2">

            <button id="seeMistakesBtn" data-action="view" type="button"
                class="list-group-item list-group-item-action border rounded-3 mb-2 d-flex justify-content-between align-items-center"
                onclick="location.href='/xatolar/?action=view'">

                <div>
                    <i class="bi bi-bookmark-check text-primary me-2"></i>
                    <strong>Mavzular bo'yicha</strong>
                    <div class="small text-muted">
                        Har bir mavzudagi xatolar
                    </div>
                </div>

                <i class="bi bi-chevron-right text-muted"></i>

            </button>

            <button id="resolveMistakesBtn" type="button"
                class="list-group-item list-group-item-action border rounded-3 d-flex justify-content-between align-items-center"
                onclick="location.href='/xatolar/?action=review'">

                <div>
                    <i class="bi bi-check2-circle text-success me-2"></i>
                    <strong>Barcha xatolar</strong>
                    <div class="small text-muted">
                        Hamma xatolarni ketma-ket yechish
                    </div>
                </div>

                <i class="bi bi-chevron-right text-muted"></i>

            </button>

        </div>

    </div>
    <!-- BOTTOM NAVIGATION FOOTER -->
    <nav class="bottom-nav d-lg-none">
        <a href="../" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>Asosiy</span>
        </a>
        <a href="../tests" class="nav-item">
            <i class="bi bi-ui-checks-grid"></i>
            <span>Testlar</span>
        </a>
        <a href="../cases" class="nav-item">
            <i class="bi bi-journal-text"></i>
            <span>Caselar</span>
        </a> <a href="../profile" class="nav-item active">
            <i class="bi bi-journal-text"></i>
            <span>Profil</span>
        </a>
    </nav>

    <!-- DATA + JS -->
    <script src="../assets/js/data.js"></script>
    <script src="/profile/profile.js"></script>
    <script src="/assets/js/test.js"></script>


    <script src="/xatolar/main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
