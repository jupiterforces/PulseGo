    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --shadow:
                0 10px 30px rgba(15, 23, 42, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* NAVBAR */

        .navbar {
            background: rgba(255, 255, 255, .82);
            backdrop-filter: blur(18px);

            border-bottom:
                1px solid rgba(0, 0, 0, .04);

            padding-top: 14px;
            padding-bottom: 14px;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -.3px;

            color: var(--text) !important;
        }

        .navbar-brand img {
            width: 40px;
            height: 40px;

            border-radius: 50%;
            object-fit: cover;
        }

        /* HERO */

        .hero {
            position: relative;

            padding:
                80px 0 35px;

            overflow: hidden;
        }

        .hero::before {
            content: "";

            position: absolute;

            width: 300px;
            height: 300px;

            border-radius: 50%;

            background:
                rgba(37, 99, 235, .08);

            filter: blur(80px);

            top: -100px;
            right: -100px;
        }

        .hero-top {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .hero-avatar {
            width: 74px;
            height: 74px;

            border-radius: 24px;

            object-fit: cover;

            box-shadow:
                0 12px 25px rgba(15, 23, 42, .12);
        }

        .hero-title {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.1;

            margin-bottom: 6px;
        }

        .hero-sub {
            color: var(--muted);
            font-size: 14px;
        }

        .hero-boxes {
            margin-top: 26px;

            display: grid;
            grid-template-columns: repeat(3, 1fr);

            gap: 12px;
        }

        .hero-box {
            background: white;

            border-radius: 22px;

            padding: 16px;

            box-shadow: var(--shadow);
        }

        .hero-box h3 {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 3px;
        }

        .hero-box p {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
        }

        /* SECTION */

        .app-section {
            padding-top: 30px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 14px;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .section-link {
            text-decoration: none;
            color: var(--primary);

            font-size: 13px;
            font-weight: 700;
        }

        /* HORIZONTAL */

        .horizontal-scroll {
            display: flex;
            gap: 12px;

            overflow-x: auto;
            overflow-y: hidden;

            scroll-behavior: smooth;

            padding-bottom: 6px;
        }

        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }

        /* COURSE CARD */

        .course-card {
            position: relative;

            min-width: 145px;
            max-width: 145px;

            background: white;

            border-radius: 24px;

            overflow: hidden;

            flex-shrink: 0;

            box-shadow: var(--shadow);

            transition: .25s ease;
        }

        .course-card:hover {
            transform: translateY(-5px);
        }

        .course-image {
            width: 100%;
            height: 100px;

            object-fit: cover;
        }

        .course-overlay {
            position: absolute;
            inset: 0;

            background:
                linear-gradient(to top,
                    rgba(15, 23, 42, .88),
                    transparent 60%);
        }

        .course-body {
            position: absolute;

            bottom: 12px;
            left: 12px;
            right: 12px;

            color: white;
        }

        .course-tag {
            display: inline-block;

            padding: 4px 8px;

            border-radius: 999px;

            background:
                rgba(255, 255, 255, .14);

            backdrop-filter: blur(10px);

            font-size: 9px;
            font-weight: 700;

            margin-bottom: 7px;
        }

        .course-name {
            font-size: .95rem;
            font-weight: 700;
        }

        /* MINI CARD */

        .mini-card {
            min-width: 120px;

            background: white;

            border-radius: 22px;

            padding: 14px;

            flex-shrink: 0;

            box-shadow: var(--shadow);

            transition: .25s ease;
        }

        .mini-card:hover {
            transform: translateY(-5px);
        }

        .mini-icon {
            width: 44px;
            height: 44px;

            border-radius: 14px;

            display: flex;
            align-items: center;
            justify-content: center;

            background:
                linear-gradient(135deg,
                    #2563eb,
                    #3b82f6);

            color: white;

            font-size: 18px;

            margin-bottom: 10px;
        }

        .mini-title {
            font-size: .85rem;
            font-weight: 700;
        }

        /* DARK TEST CARD */

        .test-card {
            min-width: 180px;

            background:
                linear-gradient(135deg,
                    #0f172a,
                    #1e293b);

            border-radius: 24px;

            padding: 18px;

            color: white;

            flex-shrink: 0;

            position: relative;

            overflow: hidden;
        }

        .test-card::before {
            content: "";

            position: absolute;

            width: 130px;
            height: 130px;

            border-radius: 50%;

            background:
                rgba(255, 255, 255, .05);

            top: -50px;
            right: -50px;
        }

        .test-top {
            font-size: 10px;
            opacity: .7;

            margin-bottom: 10px;
        }

        .test-name {
            font-size: 1rem;
            font-weight: 800;

            margin-bottom: 14px;
        }

        .test-btn {
            border: none;

            width: 38px;
            height: 38px;

            border-radius: 50%;

            background: white;

            color: #0f172a;
        }

        /* CATEGORY CHIPS */

        .chips {
            display: flex;
            gap: 10px;

            overflow-x: auto;

            margin-top: 20px;
        }

        .chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            padding: 10px 16px;

            border-radius: 999px;

            background: white;

            white-space: nowrap;

            font-size: 13px;
            font-weight: 700;

            box-shadow:
                0 4px 14px rgba(15, 23, 42, .04);
        }

        .chip.active {
            background:
                linear-gradient(135deg,
                    #2563eb,
                    #3b82f6);

            color: white;
        }

        /* MOBILE */

        @media(max-width:768px) {

            .container {
                padding-left: 14px;
                padding-right: 14px;
            }

            .hero {
                padding-top: 70px;
            }

            .hero-title {
                font-size: 1.7rem;
            }

            .hero-boxes {
                gap: 8px;
            }

            .hero-box {
                padding: 12px;
            }

            .course-card {
                min-width: 135px;
                max-width: 135px;
            }

            .mini-card {
                min-width: 110px;
            }

            .test-card {
                min-width: 165px;
            }
        }

        .publisher-card {
            position: relative;
            min-width: 170px;
            max-width: 170px;
            height: 130px;

            border-radius: 22px;
            overflow: hidden;

            flex-shrink: 0;

            box-shadow: var(--shadow);
            transition: .25s ease;
        }

        .publisher-card:hover {
            transform: translateY(-5px);
        }

        .publisher-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .publisher-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(15, 23, 42, .85),
                    transparent 60%);
        }

        .publisher-body {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            color: white;
        }

        .publisher-name {
            font-size: .95rem;
            font-weight: 800;
        }

        .publisher-meta {
            font-size: 12px;
            opacity: .85;
            margin-top: 2px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: #ffffff;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1050;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.08);
        }

        /* Nav item */
        .bottom-nav .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: #6c757d;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        /* Icon */
        .bottom-nav .nav-item i {
            display: block;
            font-size: 22px;
            margin-bottom: 2px;
        }

        /* Active */
        .bottom-nav .nav-item.active {
            color: #0d6efd;
        }

        /* Hover */
        .bottom-nav .nav-item:hover {
            color: #0d6efd;
            transform: translateY(-2px);
        }

        /* =========================
   RESPONSIVE FIXES
========================= */

        @media (max-width: 768px) {

            /* COURSE CARD */

            .course-card {
                min-width: 128px;
                max-width: 128px;
                border-radius: 20px;
            }

            .course-image {
                height: 92px;
            }

            .course-body {
                bottom: 10px;
                left: 10px;
                right: 10px;
            }

            .course-name {
                font-size: .82rem;
            }

            .course-tag {
                font-size: 8px;
                padding: 3px 7px;
            }

            /* PUBLISHER CARD */

            .publisher-card {
                min-width: 145px;
                max-width: 145px;
                height: 112px;
                border-radius: 18px;
            }

            .publisher-body {
                bottom: 10px;
                left: 10px;
                right: 10px;
            }

            .publisher-name {
                font-size: .82rem;
                line-height: 1.2;
            }

            .publisher-meta {
                font-size: 10px;
            }

            /* TEST CARD */

            .test-card {
                min-width: 155px;
                border-radius: 20px;
                padding: 15px;
            }

            .test-top {
                font-size: 8px;
                margin-bottom: 8px;
            }

            .test-name {
                font-size: .88rem;
                margin-bottom: 12px;
            }

            .test-btn {
                width: 34px;
                height: 34px;
                font-size: 13px;
            }

            /* SECTION TITLE */

            .section-title {
                font-size: 1rem;
            }

            .section-link {
                font-size: 12px;
            }

            /* GAP */

            .horizontal-scroll {
                gap: 10px;
            }
        }


        /* EXTRA SMALL DEVICES */

        @media (max-width: 420px) {

            .course-card {
                min-width: 118px;
                max-width: 118px;
            }

            .course-image {
                height: 84px;
            }

            .publisher-card {
                min-width: 135px;
                max-width: 135px;
                height: 104px;
            }

            .test-card {
                min-width: 145px;
            }

            .publisher-name,
            .course-name,
            .test-name {
                font-size: .78rem;
            }

            .publisher-meta {
                font-size: 9px;
            }

            .horizontal-scroll {
                gap: 8px;
            }
        }


        /* LARGE TABLETS + DESKTOP */

        @media (min-width: 992px) {

            .course-card {
                min-width: 175px;
                max-width: 175px;
            }

            .course-image {
                height: 120px;
            }

            .publisher-card {
                min-width: 210px;
                max-width: 210px;
                height: 150px;
            }

            .publisher-name {
                font-size: 1rem;
            }

            .publisher-meta {
                font-size: 13px;
            }

            .test-card {
                min-width: 220px;
            }

            .test-name {
                font-size: 1.1rem;
            }
        }
    </style>
